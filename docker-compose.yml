services:
  web:
    build: .
    image: pigardenweb:latest
    container_name: pigardenweb
    restart: unless-stopped
    ports:
      # host:container — open http://<NAS-IP>:<WEB_PORT> in the browser
      - "${WEB_PORT:-8080}:80"
    # All values below can be overridden from Portainer's "Environment variables"
    # section (or a .env file next to this compose). The defaults are placeholders.
    environment:
      APP_NAME: piGardenWeb
      APP_ENV: production
      APP_DEBUG: "false"
      # The address you use to reach the panel (used for generated links)
      APP_URL: "${APP_URL:-http://192.168.1.100:8080}"
      LOG_CHANNEL: stderr

      # ---- Connection to piGarden running on the Raspberry Pi ----
      PIGARDEN_SOCKET_CLIENT_IP: "${PIGARDEN_SOCKET_CLIENT_IP:-192.168.1.50}"
      PIGARDEN_SOCKET_CLIENT_PORT: "${PIGARDEN_SOCKET_CLIENT_PORT:-8084}"
      # Must match TCPSERVER_USER/TCPSERVER_PWD in /etc/piGarden.conf on the Pi
      PIGARDEN_SOCKET_CLIENT_USER: "${PIGARDEN_SOCKET_CLIENT_USER:-}"
      PIGARDEN_SOCKET_CLIENT_PWD: "${PIGARDEN_SOCKET_CLIENT_PWD:-}"

      # ---- Locale / timezone ----
      PIGARDEN_TZ: "${TZ:-Europe/Rome}"
      TIMEZONE: "${TZ:-Europe/Rome}"
      LOCALE: "${LOCALE:-it}"

      # ---- Database (SQLite, stored inside the persisted storage volume) ----
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/app/database.sqlite

      # ---- Backpack / registration ----
      BACKPACK_REGISTRATION_OPEN: "${BACKPACK_REGISTRATION_OPEN:-false}"

      # Leave empty to auto-generate & persist a key on first start, or pin one
      # from `docker compose run --rm web php artisan key:generate --show`.
      APP_KEY: "${APP_KEY:-}"

    volumes:
      # Persist database, logs, sessions and the generated app key
      - pigardenweb_storage:/var/www/html/storage
      # Persist uploaded zone icons (elfinder)
      - pigardenweb_uploads:/var/www/html/public/uploads

volumes:
  pigardenweb_storage:
  pigardenweb_uploads:
